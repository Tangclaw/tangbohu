name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SESSION_SECRET: ci-only-session-secret-for-build-validation
      DATABASE_URL: file:./tmp/ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Database smoke test
        run: |
          mkdir -p tmp
          touch tmp/ci.db
          npx prisma db push
          npm run db:seed
          npm run doctor

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
